name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=space-lumps&layout=compact&theme=blue-green&hide_progress=false&langs_count=8&border_radius=10
          path: assets/images/top-langs.svg
          token: ${{ secrets.SL_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/images/*.svg
          git commit -m "docs: Update README top languages card" || exit 0
          git push